# ------------------------------------------------------------------
# SPIDERS — Crawls concurrents avec link-following
# ------------------------------------------------------------------
spiders:
  # Exemple : Crawler un blog
  - name: example-crawler
    start_urls:
      - "https://example.com"
    allowed_domains:
      - "example.com"
    concurrent_requests: 4
    download_delay: 1.0
    max_pages: 20
    follow_links: "a[href]"
    # follow_pattern: "/blog/"  # Regex pour filtrer les liens suivis
    selectors:
      title: "h1"
      text:
        selector: "p"
        all: true
    session:
      timeout: 30
      stealthy_headers: true
      # proxy: "http://user:pass@proxy:8080"
      # impersonate: "chrome"
    output:
      format: jsonl
      file: example-crawl.jsonl
    # crawldir: "./checkpoints/example"  # Pour pause/resume

