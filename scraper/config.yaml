# ==================================================================
# TARS Scraper — Configuration des jobs et spiders
# ==================================================================
#
# 2 types de taches :
#   - jobs:    Scrape simple (1 ou N URLs, pas de link-following)
#   - spiders: Crawl concurrent (link-following, dedup, pause/resume)
#
# 3 modes de fetch :
#   - basic:   HTTP rapide via curl_cffi (par defaut)
#   - dynamic: Playwright/Chromium pour les sites JS-heavy
#   - stealth: Anti-detection (bypass Cloudflare, canvas noise, etc.)
#
# Selecteurs CSS :
#   Simple:   "h1"              -> texte du premier h1
#   Complet:  {selector: "a", attr: "href", all: true}
#

# ------------------------------------------------------------------
# JOBS — Scrapes simples (fetch + extract)
# ------------------------------------------------------------------
jobs:
  # Exemple 1 : Scrape basique d'une page
  - name: example-basic
    url: "https://example.com"
    mode: basic
    selectors:
      title: "h1"
      paragraphs:
        selector: "p"
        all: true
    output:
      format: json
      file: example-basic.json

  # Exemple 2 : Scrape de plusieurs URLs
  - name: hacker-news-top
    urls:
      - "https://news.ycombinator.com/"
      - "https://news.ycombinator.com/newest"
    mode: basic
    selectors:
      titles:
        selector: ".titleline > a"
        all: true
      scores:
        selector: ".score"
        all: true
    output:
      format: jsonl
      file: hackernews.jsonl

